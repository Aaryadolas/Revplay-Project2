<div class="player-bar">

  <!-- ── LEFT: cover art + song name ── -->
  <div class="player-left">
    <div class="art-box">
      <img
        *ngIf="songService.currentSong()?.coverImageUrl"
        [src]="songService.currentSong()!.coverImageUrl"
        alt="cover"
        (error)="$any($event.target).style.display = 'none'">
      <span class="art-icon">🎵</span>
    </div>

    <div class="track-info">
      <span class="track-title">
        {{ songService.currentSong()?.title || 'No song selected' }}
      </span>
      <span class="track-artist">
        {{ songService.currentSong()?.artistName || 'Click any song to play' }}
      </span>
    </div>
  </div>

  <!-- ── CENTER: controls + seek bar ── -->
  <div class="player-center">

    <div class="controls">

      <!-- Shuffle -->
      <button
        class="ctrl-btn"
        [class.active]="songService.isShuffle()"
        (click)="songService.toggleShuffle()"
        title="Shuffle">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
        </svg>
      </button>

      <!-- Previous -->
      <button class="ctrl-btn" (click)="songService.prevSong()" title="Previous">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
        </svg>
      </button>

      <!-- Play / Pause -->
      <button class="play-btn" (click)="songService.togglePlay()">
        <svg *ngIf="!songService.isPlaying()" width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg *ngIf="songService.isPlaying()" width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
      </button>

      <!-- Next -->
      <button class="ctrl-btn" (click)="songService.nextSong()" title="Next">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
        </svg>
      </button>

      <!-- Repeat -->
      <button
        class="ctrl-btn"
        [class.active]="songService.isRepeat()"
        (click)="songService.toggleRepeat()"
        title="Repeat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
        </svg>
      </button>

    </div>

    <!-- Seek bar -->
    <div class="seek-row">
      <span class="time-txt">{{ formatTime(songService.currentTime()) }}</span>
      <input
        type="range"
        class="seek-slider"
        min="0"
        [max]="songService.duration() > 0 ? songService.duration() : 100"
        [value]="songService.currentTime()"
        [style.--pct]="fillPct + '%'"
        (input)="seek($event)">
      <span class="time-txt">{{ formatTime(songService.duration()) }}</span>
    </div>

  </div>

  <!-- ── RIGHT: volume ── -->
  <div class="player-right">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="#b3b3b3" style="flex-shrink:0">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
    <input
      type="range"
      class="vol-slider"
      min="0" max="1" step="0.02"
      [value]="songService.volume()"
      [style.--pct]="(songService.volume() * 100) + '%'"
      (input)="onVolumeChange($event)">
  </div>

</div>
