<div class="auth-page">
  <div class="auth-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <span>🎵</span>
      <span class="logo-text">RevPlay</span>
    </div>

    <!-- Toggle -->
    <div class="auth-toggle">
      <button [class.active]="mode() === 'login'" (click)="setMode('login')">Login</button>
      <button [class.active]="mode() === 'register'" (click)="setMode('register')">Register</button>
    </div>

    <!-- Login Form -->
    <form *ngIf="mode() === 'login'" (ngSubmit)="onLogin()" class="auth-form">
      <div class="role-select">
        <h4>Login as:</h4>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="loginRole" value="LISTENER" [(ngModel)]="loginForm.rememberMe" [value]="false">
            <span class="radio-custom"></span>
            🎧 Listener
          </label>
          <label class="radio-option">
            <input type="radio" name="loginRole" value="ARTIST" [(ngModel)]="loginForm.rememberMe" [value]="true">
            <span class="radio-custom"></span>
            🎤 Artist
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="your@email.com" [(ngModel)]="loginForm.email" name="email" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="••••••••" [(ngModel)]="loginForm.password" name="password" required>
      </div>

      <label class="remember-me">
        <input type="checkbox" [(ngModel)]="loginForm.rememberMe" name="remember">
        <span>Remember me</span>
      </label>

      <div class="error-msg" *ngIf="error()">⚠️ {{error()}}</div>

      <button type="submit" class="btn-submit" [disabled]="loading()">
        <span *ngIf="!loading()">Login</span>
        <span *ngIf="loading()" class="spinner"></span>
      </button>
    </form>

    <!-- Register Form -->
    <form *ngIf="mode() === 'register'" (ngSubmit)="onRegister()" class="auth-form">
      <div class="role-select">
        <h4>Join as:</h4>
        <div class="radio-group">
          <label class="radio-option" [class.selected]="registerForm.role === 'LISTENER'">
            <input type="radio" name="role" value="LISTENER" [(ngModel)]="registerForm.role">
            <span class="radio-custom"></span>
            🎧 Listener
          </label>
          <label class="radio-option" [class.selected]="registerForm.role === 'ARTIST'">
            <input type="radio" name="role" value="ARTIST" [(ngModel)]="registerForm.role">
            <span class="radio-custom"></span>
            🎤 Artist
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>Display Name</label>
        <input type="text" placeholder="Your name" [(ngModel)]="registerForm.displayName" name="displayName">
      </div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" placeholder="username" [(ngModel)]="registerForm.username" name="username" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="your@email.com" [(ngModel)]="registerForm.email" name="email" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Min. 6 characters" [(ngModel)]="registerForm.password" name="password" required>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" placeholder="Repeat password" [(ngModel)]="registerForm.confirmPassword" name="confirmPassword" required>
      </div>

      <div class="error-msg" *ngIf="error()">⚠️ {{error()}}</div>

      <button type="submit" class="btn-submit" [disabled]="loading()">
        <span *ngIf="!loading()">Create Account</span>
        <span *ngIf="loading()" class="spinner"></span>
      </button>
    </form>

    <div class="auth-footer">
      <a routerLink="/">← Back to Home</a>
    </div>
  </div>
</div>
