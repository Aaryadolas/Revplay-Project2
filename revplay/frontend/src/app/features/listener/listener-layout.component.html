<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar" [class.open]="sidebarOpen()">
    <div class="sidebar-logo">
      <span>🎵</span>
      <span class="logo-text">RevPlay</span>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="home" routerLinkActive="active" class="nav-item" (click)="sidebarOpen.set(false)">
        <span class="icon">🏠</span>
        <span>Home</span>
      </a>
      <a routerLink="search" routerLinkActive="active" class="nav-item" (click)="sidebarOpen.set(false)">
        <span class="icon">🔍</span>
        <span>Search</span>
      </a>
      <a routerLink="favorites" routerLinkActive="active" class="nav-item" (click)="sidebarOpen.set(false)">
        <span class="icon">❤️</span>
        <span>Favorites</span>
      </a>
      <a routerLink="playlists" routerLinkActive="active" class="nav-item" (click)="sidebarOpen.set(false)">
        <span class="icon">📂</span>
        <span>Playlists</span>
      </a>
    </nav>

    <div class="sidebar-user" *ngIf="authService.currentUser()">
      <div class="user-avatar">{{authService.currentUser()!.username[0].toUpperCase()}}</div>
      <div class="user-info">
        <span class="user-name">{{authService.currentUser()!.displayName || authService.currentUser()!.username}}</span>
        <span class="user-role">Listener</span>
      </div>
      <button class="logout-btn" (click)="authService.logout()" title="Logout">⏻</button>
    </div>
  </aside>

  <!-- Mobile Overlay -->
  <div class="overlay" *ngIf="sidebarOpen()" (click)="sidebarOpen.set(false)"></div>

  <!-- Main -->
  <main class="main-content">
    <div class="mobile-header">
      <button class="hamburger" (click)="toggleSidebar()">☰</button>
      <span class="mobile-logo">🎵 RevPlay</span>
    </div>
    <div class="content-scroll">
      <router-outlet></router-outlet>
    </div>
  </main>

  <!-- Player -->
  <app-player></app-player>
</div>
