server.port=8080

# Database
spring.datasource.url=jdbc:mysql://db:3306/revplay_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=revuser
spring.datasource.password=revpass

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=revplay-super-secret-jwt-key-must-be-at-least-256-bits-long-for-hmac-sha256
app.jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=uploads

# CORS
app.cors.allowed-origins=http://localhost:4200
